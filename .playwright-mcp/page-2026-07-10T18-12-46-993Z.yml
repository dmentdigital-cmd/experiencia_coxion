        - generic [ref=e41]: Filosofía
        - heading "Responsabilidad & Origen" [level=2] [ref=e42]
      - generic [ref=e44]:
        - paragraph [ref=e45]: En COXION, la calidad es una responsabilidad que asumimos mucho antes de que el plato llegue a tu mesa, seleccionando materias primas únicas que no se encuentran en cualquier cocina. No solo elegimos con rigor lo que compramos, sino que producimos artesanalmente nuestras propias bases, salsas y condimentos para evitar los ultraprocesados; porque cuidamos el sabor y priorizamos nuestra identidad.
        - paragraph [ref=e46]: "Cocinamos con ingredientes de calidad, libre de ultraprocesados y frituras, priorizando tu bienestar. Además, cerramos el ciclo haciéndonos responsables de nuestros desechos: redistribuimos los materiales no orgánicos y convertimos los residuos orgánicos en compost a través de alianzas estratégicas. Para nosotros, cuidar lo que cocinamos es cuidar el origen y el destino de todo lo que nos nutre."
