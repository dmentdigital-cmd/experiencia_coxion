            - text: ", y llevamos la experiencia de cocinar a tu espacio para que tú y los tuyos solo se preocupen por disfrutar. Llegamos con todo listo, cocinamos para ti y nos vamos dejando una mesa llena y un recuerdo que vale la pena."
